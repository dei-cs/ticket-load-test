apiVersion: apps/v1
kind: Deployment
metadata:
  name: cart
  namespace: ticket-system
spec:
  replicas: 3
  selector:
    matchLabels:
      app: cart
  template:
    metadata:
      labels:
        app: cart
    spec:
      initContainers:
        - name: wait-for-pgbouncer
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z pgbouncer 5432; do echo waiting for pgbouncer; sleep 2; done']
      containers:
        - name: cart
          image: deidock/ticket-load-test-cart:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8003
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: DATABASE_URL
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "otel-collector:4317"
            - name: DB_POOL_SIZE
              value: "3"
            - name: WORKERS
              value: "4"
            - name: REDIS_ENABLED
              value: "true"
            - name: REDIS_URL
              value: "redis://redis:6379"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8003
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8003
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 1000m
              memory: 683Mi
            limits:
              cpu: 1000m
              memory: 683Mi
