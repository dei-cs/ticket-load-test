apiVersion: apps/v1
kind: Deployment
metadata:
  name: ticket-info
  namespace: ticket-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ticket-info
  template:
    metadata:
      labels:
        app: ticket-info
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z postgres 5432; do echo waiting for postgres; sleep 2; done']
        - name: wait-for-redis
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z redis 6379; do echo waiting for redis; sleep 2; done']
      containers:
        - name: ticket-info
          image: deidock/ticket-load-test-ticket-info:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8002
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: DIRECT_DATABASE_URL
            - name: REDIS_ENABLED
              value: "true"
            - name: REDIS_URL
              value: "redis://redis:6379"
            - name: REDIS_TTL_SECONDS
              value: "5"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8002
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8002
            initialDelaySeconds: 60
            periodSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
