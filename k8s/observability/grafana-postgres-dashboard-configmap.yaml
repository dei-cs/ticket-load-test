apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-postgres-dashboard
  namespace: ticket-system
data:
  postgres.json: |
    {
      "uid": "postgres-observability",
      "title": "Postgres",
      "tags": ["ticket-load-test", "postgres"],
      "timezone": "browser",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "5s",
      "editable": true,
      "graphTooltip": 0,
      "time": {
        "from": "now-30m",
        "to": "now"
      },
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "Postgres up",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "pg_up"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "green", "value": 1 }
                ]
              }
            }
          },
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 0 }
        },
        {
          "id": 2,
          "type": "timeseries",
          "title": "Connections by state",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum by (state) (pg_stat_activity_count)"
            }
          ],
          "gridPos": { "h": 8, "w": 12, "x": 6, "y": 0 }
        },
        {
          "id": 3,
          "type": "gauge",
          "title": "Connection usage %",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "100 * sum(pg_stat_activity_count) / scalar(max(pg_settings_max_connections))"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 60 },
                  { "color": "red", "value": 85 }
                ]
              }
            }
          },
          "gridPos": { "h": 8, "w": 6, "x": 18, "y": 0 }
        },
        {
          "id": 4,
          "type": "timeseries",
          "title": "Transactions/sec",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "rate(pg_stat_database_xact_commit{datname=\"ticketmanagerdb\"}[1m])"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "ops"
            }
          },
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 8 }
        },
        {
          "id": 5,
          "type": "timeseries",
          "title": "Rollbacks/sec",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "rate(pg_stat_database_xact_rollback{datname=\"ticketmanagerdb\"}[1m])"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "ops"
            }
          },
          "gridPos": { "h": 8, "w": 8, "x": 8, "y": 8 }
        },
        {
          "id": 6,
          "type": "stat",
          "title": "Deadlocks in last 5m",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "increase(pg_stat_database_deadlocks{datname=\"ticketmanagerdb\"}[5m])"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 1 }
                ]
              }
            }
          },
          "gridPos": { "h": 8, "w": 8, "x": 16, "y": 8 }
        },
        {
          "id": 7,
          "type": "gauge",
          "title": "Cache hit ratio",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "pg_stat_database_blks_hit{datname=\"ticketmanagerdb\"} / (pg_stat_database_blks_hit{datname=\"ticketmanagerdb\"} + pg_stat_database_blks_read{datname=\"ticketmanagerdb\"})"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0,
              "max": 1,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "yellow", "value": 0.9 },
                  { "color": "green", "value": 0.98 }
                ]
              }
            }
          },
          "gridPos": { "h": 8, "w": 6, "x": 0, "y": 16 }
        },
        {
          "id": 8,
          "type": "timeseries",
          "title": "Rows changed/sec",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "rate(pg_stat_database_tup_inserted{datname=\"ticketmanagerdb\"}[1m])",
              "legendFormat": "inserted"
            },
            {
              "refId": "B",
              "expr": "rate(pg_stat_database_tup_updated{datname=\"ticketmanagerdb\"}[1m])",
              "legendFormat": "updated"
            },
            {
              "refId": "C",
              "expr": "rate(pg_stat_database_tup_deleted{datname=\"ticketmanagerdb\"}[1m])",
              "legendFormat": "deleted"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "ops"
            }
          },
          "gridPos": { "h": 8, "w": 18, "x": 6, "y": 16 }
        }
      ]
    }
