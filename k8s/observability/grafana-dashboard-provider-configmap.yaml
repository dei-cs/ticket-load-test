apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: ticket-system
data:
  dashboard-provider.yaml: |
    apiVersion: 1
    providers:
      - name: "Ticket Load Test Dashboards"
        orgId: 1
        folder: "Ticket Load Test"
        type: file
        disableDeletion: false
        updateIntervalSeconds: 10
        allowUiUpdates: true
        options:
          path: /var/lib/grafana/dashboards
