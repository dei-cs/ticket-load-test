apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: ticket-system
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    exporters:
      otlp/tempo:
        endpoint: tempo:4317
        tls:
          insecure: true

      prometheus:
        endpoint: "0.0.0.0:9464"

      debug:
        verbosity: detailed

    service:
      pipelines:
        traces:
          receivers: [otlp]
          exporters: [otlp/tempo, debug]

        metrics:
          receivers: [otlp]
          exporters: [prometheus, debug]
