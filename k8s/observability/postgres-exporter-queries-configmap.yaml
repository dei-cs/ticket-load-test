apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-exporter-queries
  namespace: ticket-system
data:
  queries.yaml: |
    pg_connection_health:
      query: |
        SELECT
          count(*) FILTER (WHERE state = 'idle in transaction') AS idle_in_transaction,
          count(*) FILTER (WHERE wait_event_type = 'Lock') AS lock_waiters,
          COALESCE(EXTRACT(EPOCH FROM max(CASE WHEN state != 'idle' THEN now() - xact_start END)), 0) AS max_tx_age_seconds
        FROM pg_stat_activity
        WHERE datname = 'ticketmanagerdb'
      master: true
      metrics:
        - idle_in_transaction:
            usage: "GAUGE"
            description: "Connections idle in transaction (hold locks, block others)"
        - lock_waiters:
            usage: "GAUGE"
            description: "Connections waiting to acquire a lock"
        - max_tx_age_seconds:
            usage: "GAUGE"
            description: "Age in seconds of the longest running active transaction"

    pg_connections_by_app:
      query: |
        SELECT
          application_name,
          state,
          count(*) AS count
        FROM pg_stat_activity
        WHERE datname = 'ticketmanagerdb'
          AND application_name != ''
        GROUP BY application_name, state
      master: true
      metrics:
        - application_name:
            usage: "LABEL"
            description: "Application name"
        - state:
            usage: "LABEL"
            description: "Connection state"
        - count:
            usage: "GAUGE"
            description: "Number of connections"

    pg_bgwriter_health:
      query: |
        SELECT
          checkpoints_timed,
          checkpoints_req,
          buffers_checkpoint,
          buffers_clean,
          buffers_backend,
          buffers_backend_fsync
        FROM pg_stat_bgwriter
      master: true
      metrics:
        - checkpoints_timed:
            usage: "COUNTER"
            description: "Scheduled checkpoints"
        - checkpoints_req:
            usage: "COUNTER"
            description: "Requested checkpoints (high = checkpoint pressure)"
        - buffers_checkpoint:
            usage: "COUNTER"
            description: "Buffers written during checkpoints"
        - buffers_clean:
            usage: "COUNTER"
            description: "Buffers written by bgwriter"
        - buffers_backend:
            usage: "COUNTER"
            description: "Buffers written directly by backend (high = bgwriter can't keep up)"
        - buffers_backend_fsync:
            usage: "COUNTER"
            description: "Backend fsync calls (should be 0)"
