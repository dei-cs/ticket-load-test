services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: devuser
      POSTGRES_PASSWORD: devpassword123
      POSTGRES_DB: ticketmanagerdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devuser -d ticketmanagerdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  user-generator:
    build:
      context: ./user-generator
      dockerfile: Dockerfile
    ports:
      - "8000:8000"

  ticket-manager:
    build:
      context: ./ticket-manager
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://devuser:devpassword123@postgres:5432/ticketmanagerdb
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import socket; socket.create_connection((\"localhost\", 8001), timeout=1)'"]
      interval: 5s
      timeout: 5s
      retries: 10
    depends_on:
      postgres:
        condition: service_healthy

  ticket-info:
    build:
      context: ./ticket-info
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://devuser:devpassword123@postgres:5432/ticketmanagerdb
    ports:
      - "8002:8002"
    depends_on:
      postgres:
        condition: service_healthy

  cart:
    build:
      context: ./cart
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://devuser:devpassword123@postgres:5432/ticketmanagerdb
    ports:
      - "8003:8003"
    depends_on:
      postgres:
        condition: service_healthy

  tempo:
    image: grafana/tempo:2.9.0
    container_name: tempo
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./tempo.yaml:/etc/tempo.yaml
    ports:
      - "3200:3200"
      - "4319:4317"

  otel-collector:
    image: otel/opentelemetry-collector:latest
    container_name: otel-collector
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol/config.yaml
    ports:
      - "4317:4317"
      - "4318:4318"
      - "9464:9464"
    depends_on:
      - tempo

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yaml"
    volumes:
      - ./prometheus.yaml:/etc/prometheus/prometheus.yaml
    ports:
      - "9090:9090"
    depends_on:
      - otel-collector

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - tempo
      - prometheus

volumes:
  postgres_data: